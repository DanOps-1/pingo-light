name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"
      - name: Run tests
        run: ./tests/test.sh
