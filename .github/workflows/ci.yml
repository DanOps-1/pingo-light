name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"

      - name: Run core test suite
        run: ./tests/test.sh

  fuzz:
    name: JSON Fuzz + Edge Cases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"

      - name: JSON fuzz tests
        run: ./tests/test-json.sh

      - name: Git edge case tests
        run: ./tests/test-edge.sh

  mcp:
    name: MCP Protocol Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"

      - name: MCP protocol tests
        run: python3 ./tests/test-mcp.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python syntax check
        run: |
          python3 -c "import py_compile; py_compile.compile('bingo-light', doraise=True)"
          python3 -c "import py_compile; py_compile.compile('bingo_core.py', doraise=True)"
          python3 -c "import py_compile; py_compile.compile('mcp-server.py', doraise=True)"

      - name: Flake8
        run: |
          pip install flake8
          flake8 bingo-light bingo_core.py mcp-server.py --max-line-length=120 --ignore=E501,W503,E302,E305,E402

      - name: ShellCheck (bash scripts)
        run: |
          shellcheck --severity=error bingo-light.bash
          shellcheck --severity=error tests/test.sh tests/test-json.sh tests/test-edge.sh
          shellcheck --severity=error contrib/hooks/*

  sync-check:
    name: Sync Points Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: VERSION consistency
        run: |
          V=$(python3 -c "import re; print(re.search(r'VERSION\s*=\s*\"(.+?)\"', open('bingo_core.py').read()).group(1))")
          echo "Source of truth: bingo_core.py VERSION=$V"
          FAIL=0
          check() { if [ "$2" != "$V" ]; then echo "::error::$1 has version $2, expected $V"; FAIL=1; fi; }
          check "mcp-server.py" "$(python3 -c "import re; print(re.search(r'\"version\":\s*\"(.+?)\"', open('mcp-server.py').read()).group(1))")"
          check "homebrew formula" "$(python3 -c "import re; print(re.search(r'v(\d+\.\d+\.\d+)\.tar\.gz', open('contrib/homebrew/bingo-light.rb').read()).group(1))")"
          grep -q "currently $V" CLAUDE.md || { echo "::error::CLAUDE.md does not mention 'currently $V'"; FAIL=1; }
          grep -q "## \[$V\]" CHANGELOG.md || { echo "::error::CHANGELOG.md missing entry for [$V]"; FAIL=1; }
          [ "$FAIL" = "0" ] || exit 1

      - name: MCP tool count consistency
        run: |
          N=$(python3 -c "import re; print(len(re.findall(r'\"name\":\s*\"bingo_', open('mcp-server.py').read())))")
          echo "Actual MCP tools: $N"
          FAIL=0
          for f in README.md README.zh-CN.md; do
            if ! grep -q "${N}_tools\|${N}.*tool\|${N} 个工具" "$f"; then
              echo "::error::$f does not mention $N tools"; FAIL=1
            fi
          done
          grep -q "$N tools\|$N 个工具\|$N tool" CLAUDE.md || { echo "::error::CLAUDE.md tool count mismatch"; FAIL=1; }
          grep -q "$N MCP tools" docs/getting-started.md || { echo "::error::docs/getting-started.md tool count mismatch"; FAIL=1; }
          grep -q "$N tools" install.sh || { echo "::error::install.sh tool count mismatch"; FAIL=1; }
          [ "$FAIL" = "0" ] || exit 1

      - name: README.zh-CN.md required sections
        run: |
          # These sections MUST exist in zh-CN (mapped from EN equivalents)
          FAIL=0
          require() { grep -q "^## $1" README.zh-CN.md || { echo "::error::README.zh-CN.md missing section: ## $1"; FAIL=1; }; }
          require "快速开始"
          require "安装"
          require "功能特性"
          require "工作原理"
          require "命令参考"
          require "常见问题"
          require "为什么不用..."
          require "与其他方案对比"
          require "项目生态"
          require "参与贡献"
          require "许可证"
          [ "$FAIL" = "0" ] || exit 1
          echo "All required zh-CN sections present"

      - name: bingo-light importability
        run: |
          python3 -c "
          import importlib.util, sys, os
          sys.path.insert(0, '.')
          import bingo_core
          print(f'bingo_core.VERSION={bingo_core.VERSION}')
          "

  unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"

      - name: Run unit tests
        run: python3 tests/test_core.py
