name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release + PyPI + npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python3 -c "import re; print(re.search(r'VERSION\s*=\s*\"(.+?)\"', open('bingo_core/__init__.py').read()).group(1))")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match VERSION=$VERSION in bingo_core/__init__.py"
            exit 1
          fi

      - name: Run tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"
          ./tests/test.sh

      - name: Create release archive
        run: |
          mkdir -p dist
          tar czf dist/bingo-light-${GITHUB_REF#refs/tags/v}.tar.gz \
            bingo-light bingo_core/ mcp-server.py contrib/agent.py contrib/tui.py \
            install.sh completions/ LICENSE README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bingo-light-*.tar.gz
            bingo-light
            mcp-server.py

      # ── PyPI ──
      - name: Build Python package
        run: |
          pip install build
          python3 -m build --wheel
          rm -f dist/*.tar.gz
          ls -la dist/

      - name: Verify built package works
        run: |
          python3 -m venv /tmp/bl-verify
          /tmp/bl-verify/bin/pip install dist/*.whl
          /tmp/bl-verify/bin/bingo-light --version
          /tmp/bl-verify/bin/bingo-light setup --yes --json 2>/dev/null | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('ok') is not None, 'setup returned no ok field'
          print(f'Verified: setup works, configured={d.get(\"configured\", [])}')"
          rm -rf /tmp/bl-verify

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

      # ── npm ──
      - name: Verify npm package works
        run: |
          npm pack
          npm install -g bingo-light-*.tgz
          bingo-light --version
          bingo-light setup --yes --json 2>/dev/null | python3 -c "
          import sys, json; d = json.load(sys.stdin)
          assert d.get('ok') is not None, 'setup failed'
          print(f'Verified: npm package works')"
          npm uninstall -g bingo-light
          rm -f bingo-light-*.tgz

      - name: Publish to npm (semver-aware dist-tag)
        # Guard: only tag as `latest` if this version is >= the current
        # npm `latest`. Prevents an out-of-order release (e.g. a patch to
        # an older line pushed after a newer tag) from overwriting latest.
        run: |
          set -e
          THIS="${GITHUB_REF#refs/tags/v}"
          CURRENT="$(npm view bingo-light version 2>/dev/null || echo "0.0.0")"
          IS_NEWEST=$(python3 - "$THIS" "$CURRENT" <<'PY'
          import sys
          def key(v):
              out = []
              for p in v.split("."):
                  try: out.append(int(p))
                  except ValueError: out.append(0)
              return tuple(out)
          this, cur = sys.argv[1], sys.argv[2]
          print("yes" if key(this) >= key(cur) else "no")
          PY
          )
          if [ "$IS_NEWEST" = "yes" ]; then
            echo "Publishing $THIS as latest (>= npm latest $CURRENT)"
            npm publish --access public
          else
            echo "Publishing $THIS as --tag previous (< npm latest $CURRENT)"
            npm publish --access public --tag previous
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: env.NODE_AUTH_TOKEN != ''
