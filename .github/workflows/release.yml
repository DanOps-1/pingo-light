name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python3 -c "import re; print(re.search(r'VERSION\s*=\s*\"(.+?)\"', open('bingo_core.py').read()).group(1))")
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match VERSION=$VERSION in bingo_core.py"
            exit 1
          fi

      - name: Run tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"
          ./tests/test.sh

      - name: Create release archive
        run: |
          mkdir -p dist
          tar czf dist/bingo-light-${GITHUB_REF#refs/tags/v}.tar.gz \
            bingo-light bingo_core.py mcp-server.py agent.py tui.py \
            install.sh completions/ LICENSE README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bingo-light-*.tar.gz
            bingo-light
            bingo_core.py
            mcp-server.py

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
