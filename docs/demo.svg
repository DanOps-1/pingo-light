    <rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="8" class="background"> </text></g><g id="g2"><text x="0" textLength="248" class="foreground">$ bingo-light init /tmp/demo-up</text></g><g id="g3"><text x="0" textLength="216" class="foreground">OK bingo-light initialized!</text></g><g id="g4"><text x="0" textLength="272" class="foreground">  Upstream : /tmp/demo-up (master)</text></g><g id="g5"><text x="0" textLength="208" class="foreground">  Patches  : bingo-patches</text></g><g id="g6"><text x="0" textLength="280" class="foreground">$ bingo-light patch new redis-cache</text></g><g id="g7"><text x="0" textLength="240" class="foreground">OK Patch 'redis-cache' created</text></g><g id="g8"><text x="0" textLength="256" class="foreground">  Patch stack: 1 patch(es) total</text></g><g id="g9"><text x="0" textLength="160" class="foreground">$ bingo-light status</text></g><g id="g10"><text x="0" textLength="144" font-weight="bold" class="foreground">bingo-light status</text></g><g id="g11"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="72" font-weight="bold" class="foreground">Upstream:</text><text x="88" textLength="112" class="foreground">  /tmp/demo-up</text></g><g id="g12"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="56" font-weight="bold" class="foreground">Branch:</text><text x="72" textLength="72" class="foreground">   master</text></g><g id="g13"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="64" font-weight="bold" class="foreground">Current:</text><text x="80" textLength="120" class="foreground">  bingo-patches</text></g><g id="g14"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="216" class="color3">3 commit(s) behind upstream</text></g><g id="g15"><text x="0" textLength="224" class="foreground">  Last synced: 7 seconds ago</text></g><g id="g16"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="64" font-weight="bold" class="foreground">Patches:</text><text x="80" textLength="16" class="foreground"> 1</text></g><g id="g17"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="16" class="color6"> 1</text><text x="32" textLength="560" class="foreground"> [bl] redis-cache: add Redis caching                96442c7  1 file(s)</text></g><g id="g18"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="80" class="color2">No overlap</text><text x="96" textLength="344" class="foreground"> between your patches and upstream changes.</text></g><g id="g19"><text x="0" textLength="184" class="foreground">  Sync should be clean.</text></g><g id="g20"><text x="0" textLength="144" class="foreground">$ bingo-light sync</text></g><g id="g21"><text x="0" textLength="192" font-weight="bold" class="foreground">Syncing with upstream...</text></g><g id="g22"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="288" class="foreground"> Fetching upstream (/tmp/demo-up)...</text></g><g id="g23"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="112" class="foreground"> Upstream has </text><text x="120" textLength="8" font-weight="bold" class="foreground">3</text><text x="128" textLength="120" class="foreground"> new commit(s).</text></g><g id="g24"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="80" class="foreground"> You have </text><text x="88" textLength="8" font-weight="bold" class="foreground">1</text><text x="96" textLength="168" class="foreground"> patch(es) to rebase.</text></g><g id="g25"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="224" class="foreground"> Updating tracking branch...</text></g><g id="g26"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="304" class="foreground"> Rebasing patches onto new upstream...</text></g><g id="g27"><text x="0" textLength="464" class="foreground">Successfully rebased and updated refs/heads/bingo-patches.</text></g><g id="g28"><text x="0" textLength="16" class="color2">OK</text><text x="16" textLength="384" class="foreground"> Sync complete! All 1 patch(es) rebased cleanly.</text></g><g id="g29"><text x="0" textLength="312" class="foreground">  You are now up to date with upstream.</text></g><g id="g30"><text x="0" textLength="40" class="foreground">Done!</text></g></defs><g id="screen_view"><g><rect x="0" y="0" width="8" height="17" class="foreground"/><use xlink:href="#g1" y="0"/></g><g><rect x="0" y="510" width="8" height="17" class="foreground"/><use xlink:href="#g1" y="510"/></g><g><use xlink:href="#g2" y="1020"/><rect x="0" y="1037" width="8" height="17" class="foreground"/><use xlink:href="#g1" y="1037"/></g><g><use xlink:href="#g2" y="1530"/><use xlink:href="#g3" y="1547"/><use xlink:href="#g4" y="1564"/><use xlink:href="#g5" y="1581"/><rect x="0" y="1598" width="8" height="17" class="foreground"/><use xlink:href="#g1" y="1598"/></g><g><use xlink:href="#g2" y="2040"/><use xlink:href="#g3" y="2057"/><use xlink:href="#g4" y="2074"/><use xlink:href="#g5" y="2091"/><use xlink:href="#g6" y="2125"/><rect x="0" y="2142" width="8" height="17" class="foreground"/><use xlink:href="#g1" y="2142"/></g><g><use xlink:href="#g2" y="2550"/><use xlink:href="#g3" y="2567"/><use xlink:href="#g4" y="2584"/><use xlink:href="#g5" y="2601"/><use xlink:href="#g6" y="2635"/><use xlink:href="#g7" y="2652"/><use xlink:href="#g8" y="2669"/><rect x="0" y="2686" width="8" height="17" class="foreground"/><use xlink:href="#g1" y="2686"/></g><g><use xlink:href="#g2" y="3060"/><use xlink:href="#g3" y="3077"/><use xlink:href="#g4" y="3094"/><use xlink:href="#g5" y="3111"/><use xlink:href="#g6" y="3145"/><use xlink:href="#g7" y="3162"/><use xlink:href="#g8" y="3179"/><use xlink:href="#g9" y="3213"/><rect x="0" y="3230" width="8" height="17" class="foreground"/><use xlink:href="#g