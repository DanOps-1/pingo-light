    <rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="296" class="foreground">$ bingo-light init /tmp/demo-upstream</text></g><g id="g2"><text x="0" textLength="8" class="background"> </text></g><g id="g3"><text x="0" textLength="216" class="foreground">OK bingo-light initialized!</text></g><g id="g4"><text x="0" textLength="320" class="foreground">  Upstream : /tmp/demo-upstream (master)</text></g><g id="g5"><text x="0" textLength="496" class="foreground">  Tracking : upstream-tracking (mirrors upstream, don't touch)</text></g><g id="g6"><text x="0" textLength="448" class="foreground">  Patches  : bingo-patches (your customizations go here)</text></g><g id="g7"><text x="0" textLength="376" class="foreground">$ echo "import redis; CACHE_TTL=300" &gt; cache.py</text></g><g id="g8"><text x="0" textLength="280" class="foreground">$ bingo-light patch new redis-cache</text></g><g id="g9"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="616" class="foreground"> Using staged changes only. Unstaged changes will remain in the working tree.</text></g><g id="g10"><text x="0" textLength="520" class="foreground">[bingo-patches ba0c351] [bl] redis-cache: add Redis caching layer</text></g><g id="g11"><text x="0" textLength="248" class="foreground"> 1 file changed, 1 insertion(+)</text></g><g id="g12"><text x="0" textLength="224" class="foreground"> create mode 100644 cache.py</text></g><g id="g13"><text x="0" textLength="16" class="color2">OK</text><text x="16" textLength="64" class="foreground"> Patch '</text><text x="80" textLength="88" font-weight="bold" class="foreground">redis-cache</text><text x="168" textLength="152" class="foreground">' created (ba0c351)</text></g><g id="g14"><text x="0" textLength="256" class="foreground">  Patch stack: 1 patch(es) total</text></g><g id="g15"><text x="0" textLength="160" class="foreground">$ bingo-light status</text></g><g id="g16"><text x="0" textLength="144" font-weight="bold" class="foreground">bingo-light status</text></g><g id="g17"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="72" font-weight="bold" class="foreground">Upstream:</text><text x="88" textLength="160" class="foreground">  /tmp/demo-upstream</text></g><g id="g18"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="56" font-weight="bold" class="foreground">Branch:</text><text x="72" textLength="72" class="foreground">   master</text></g><g id="g19"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="64" font-weight="bold" class="foreground">Current:</text><text x="80" textLength="120" class="foreground">  bingo-patches</text></g><g id="g20"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="216" class="color3">3 commit(s) behind upstream</text></g><g id="g21"><text x="0" textLength="224" class="foreground">  Last synced: 4 seconds ago</text></g><g id="g22"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="64" font-weight="bold" class="foreground">Patches:</text><text x="80" textLength="16" class="foreground"> 1</text></g><g id="g23"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="16" class="color6"> 1</text><text x="32" textLength="560" class="foreground"> [bl] redis-cache: add Redis caching layer          ba0c351  1 file(s)</text></g><g id="g24"><text x="0" textLength="16" class="foreground">  </text><text x="16" textLength="80" class="color2">No overlap</text><text x="96" textLength="344" class="foreground"> between your patches and upstream changes.</text></g><g id="g25"><text x="0" textLength="184" class="foreground">  Sync should be clean.</text></g><g id="g26"><text x="0" textLength="144" class="foreground">$ bingo-light sync</text></g><g id="g27"><text x="0" textLength="192" font-weight="bold" class="foreground">Syncing with upstream...</text></g><g id="g28"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="336" class="foreground"> Fetching upstream (/tmp/demo-upstream)...</text></g><g id="g29"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="112" class="foreground"> Upstream has </text><text x="120" textLength="8" font-weight="bold" class="foreground">3</text><text x="128" textLength="120" class="foreground"> new commit(s).</text></g><g id="g30"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="80" class="foreground"> You have </text><text x="88" textLength="8" font-weight="bold" class="foreground">1</text><text x="96" textLength="168" class="foreground"> patch(es) to rebase.</text></g><g id="g31"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="224" class="foreground"> Updating tracking branch...</text></g><g id="g32"><text x="0" textLength="8" class="color4">&gt;</text><text x="8" textLength="304" class="foreground"> Rebasing patches onto new upstream...</text></g><g id="g33"><text x="0" textLength="464" class="foreground">Successfully rebased and updated refs/heads/bingo-patches.</text></g><g id="g34"><text x="0" textLength="16" class="color2">OK</text><text x="16" textLength="384" class="foreground"> Sync complete! All 1 patch(es) rebased cleanly.</text></g><g id="g35"><text x="0" textLength="312" class="foreground">  You are now up to date with upstream.</text></g><g id="g36"><text x="0" textLength="216" class="foreground">Done! Your fork is in sync.</text></g></defs><g id="screen_view"><g><use xlink:href="#g1" y="0"/><rect x="0" y="17" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="17"/></g><g><use xlink:href="#g1" y="476"/><use xlink:href="#g3" y="493"/><use xlink:href="#g4" y="510"/><use xlink:href="#g5" y="527"/><use xlink:href="#g6" y="544"/><rect x="0" y="561" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="561"/></g><g><use xlink:href="#g1" y="952"/><use xlink:hr