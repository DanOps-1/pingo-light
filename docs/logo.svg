<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Glow effect -->
  <ellipse cx="256" cy="220" rx="140" ry="80" fill="url(#glow)"/>

  <!-- Fork lines (upstream) -->
  <line x1="256" y1="100" x2="256" y2="200" stroke="#4b5563" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="200" x2="180" y2="260" stroke="#4b5563" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="200" x2="332" y2="260" stroke="#4b5563" stroke-width="4" stroke-linecap="round"/>

  <!-- Upstream commits (gray) -->
  <circle cx="256" cy="100" r="10" fill="#6b7280"/>
  <circle cx="256" cy="150" r="10" fill="#6b7280"/>
  <circle cx="256" cy="200" r="10" fill="#6b7280"/>

  <!-- Left branch — upstream continues -->
  <circle cx="180" cy="260" r="10" fill="#6b7280"/>
  <line x1="180" y1="260" x2="180" y2="320" stroke="#4b5563" stroke-width="4" stroke-linecap="round"/>
  <circle cx="180" cy="320" r="10" fill="#6b7280"/>

  <!-- Right branch — your patches (colored) -->
  <circle cx="332" cy="260" r="12" fill="url(#accent)"/>
  <line x1="332" y1="260" x2="332" y2="320" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="332" cy="320" r="12" fill="url(#accent)"/>
  <line x1="332" y1="320" x2="332" y2="380" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="332" cy="380" r="12" fill="url(#accent)"/>

  <!-- Sync arrow (left to right, upstream -> patches) -->
  <path d="M195 290 Q256 275 317 290" stroke="#34d399" stroke-width="3" fill="none" stroke-dasharray="6,4"/>
  <polygon points="314,283 322,290 314,297" fill="#34d399"/>

  <!-- Patch stack labels -->
  <rect x="350" y="251" rx="4" ry="4" width="36" height="18" fill="#60a5fa" opacity="0.2"/>
  <text x="368" y="264" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold">P1</text>
  <rect x="350" y="311" rx="4" ry="4" width="36" height="18" fill="#818cf8" opacity="0.2"/>
  <text x="368" y="324" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="10" font-weight="bold">P2</text>
  <rect x="350" y="371" rx="4" ry="4" width="36" height="18" fill="#a78bfa" opacity="0.2"/>
  <text x="368" y="384" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">P3</text>

  <!-- Title -->
  <text x="256" y="440" text-anchor="middle" fill="#e5e7eb" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="2">bingo-light</text>
  <text x="256" y="462" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="11">fork maintenance for AI agents</text>
</svg>
